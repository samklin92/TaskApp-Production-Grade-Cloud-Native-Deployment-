# IMPORTANT: Template only — never commit real credentials
# Generate values: echo -n "your-value" | base64
# Apply directly to cluster: kubectl apply -f your-real-secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: taskapp-secrets
  namespace: taskapp
type: Opaque
data:
  DATABASE_USER: REPLACE_WITH_BASE64_VALUE
  DATABASE_PASSWORD: REPLACE_WITH_BASE64_VALUE
  DATABASE_NAME: REPLACE_WITH_BASE64_VALUE
  SECRET_KEY: REPLACE_WITH_BASE64_VALUE
